<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 32" width="100" height="32" shape-rendering="crispEdges">

  <!-- ── Stock plate ── -->
  <rect x="0"  y="12" width="14" height="8"  fill="#1e2124"/>
  <rect x="0"  y="12" width="14" height="2"  fill="#4a5568"/>
  <rect x="0"  y="18" width="14" height="2"  fill="#111315"/>

  <!-- Stock buffer tube -->
  <rect x="12" y="10" width="6"  height="12" fill="#2d3748"/>
  <rect x="12" y="10" width="6"  height="2"  fill="#4a5568"/>
  <rect x="12" y="20" width="6"  height="2"  fill="#111315"/>

  <!-- ── Receiver top rail ── -->
  <rect x="16" y="6"  width="36" height="2"  fill="#718096"/>
  <!-- Rear sight bump -->
  <rect x="16" y="4"  width="4"  height="4"  fill="#4a5568"/>
  <!-- Receiver body -->
  <rect x="16" y="8"  width="36" height="14" fill="#1e2124"/>
  <rect x="16" y="8"  width="36" height="3"  fill="#2d3748"/>
  <rect x="16" y="20" width="36" height="2"  fill="#111315"/>

  <!-- Charging handle -->
  <rect x="22" y="5"  width="4"  height="4"  fill="#4a5568"/>
  <rect x="23" y="4"  width="2"  height="2"  fill="#718096"/>

  <!-- ── Pistol grip ── -->
  <rect x="28" y="22" width="8"  height="8"  fill="#1e2124"/>
  <rect x="29" y="22" width="6"  height="2"  fill="#4a5568"/>
  <rect x="29" y="24" width="6"  height="6"  fill="#2d3748"/>
  <!-- grip texture lines -->
  <rect x="30" y="25" width="1"  height="4"  fill="#1e2124"/>
  <rect x="32" y="25" width="1"  height="4"  fill="#1e2124"/>
  <rect x="34" y="25" width="1"  height="4"  fill="#1e2124"/>

  <!-- ── AK-12 magazine (curved) ── -->
  <rect x="36" y="22" width="12" height="3"  fill="#4a5568"/>
  <rect x="37" y="25" width="11" height="5"  fill="#2d3748"/>
  <rect x="38" y="30" width="9"  height="2"  fill="#1e2124"/>
  <!-- mag curve -->
  <rect x="44" y="27" width="4"  height="5"  fill="#1e2124"/>
  <rect x="44" y="27" width="4"  height="1"  fill="#4a5568"/>

  <!-- ── Handguard ── -->
  <rect x="52" y="9"  width="18" height="13" fill="#2d3748"/>
  <rect x="52" y="9"  width="18" height="2"  fill="#4a5568"/>
  <rect x="52" y="20" width="18" height="2"  fill="#111315"/>
  <!-- handguard vents -->
  <rect x="55" y="13" width="2"  height="5"  fill="#111315"/>
  <rect x="59" y="13" width="2"  height="5"  fill="#111315"/>
  <rect x="63" y="13" width="2"  height="5"  fill="#111315"/>

  <!-- ── Front sight block ── -->
  <rect x="68" y="5"  width="4"  height="7"  fill="#4a5568"/>
  <rect x="69" y="3"  width="2"  height="4"  fill="#718096"/>

  <!-- ── Barrel ── -->
  <rect x="70" y="12" width="22" height="6"  fill="#2d3748"/>
  <rect x="70" y="12" width="22" height="1"  fill="#718096"/>
  <rect x="70" y="17" width="22" height="1"  fill="#111315"/>

  <!-- ── Muzzle brake ── -->
  <rect x="90" y="9"  width="10" height="14" fill="#4a5568"/>
  <rect x="91" y="11" width="7"  height="10" fill="#1e2124"/>
  <rect x="98" y="10" width="2"  height="12" fill="#718096"/>
  <!-- brake slots -->
  <rect x="91" y="13" width="7"  height="2"  fill="#4a5568"/>
  <rect x="91" y="17" width="7"  height="2"  fill="#4a5568"/>

</svg>
